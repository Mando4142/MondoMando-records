<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando - Admin Schaltzentrale (Records)</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --text-main: #ffffff; --form-bg: rgba(19, 19, 26, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 800px; }
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-pink); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); backdrop-filter: blur(5px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 20px;}
        h1 { margin: 0; font-size: 32px; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-pink); }
        .admin-time-box { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: rgba(5, 5, 7, 0.6); border: 1px dashed var(--neon-cyan); border-radius: 8px; font-family: sans-serif; font-size: 16px; font-weight: bold; }
        .time-value { color: var(--neon-cyan); }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: rgba(5, 5, 7, 0.85); border: 2px solid #2a2a35; border-radius: 8px; margin-bottom: 15px; font-family: sans-serif; }
        .actions-flex { display: flex; gap: 10px; align-items: center; }
        .btn-control { background: #374151; color: white; border: none; padding: 10px 15px; font-family: sans-serif; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .link-icon { font-size: 16px; text-decoration: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .icon-spotify { background: #1DB954; color: black; }
        .icon-youtube { background: #FF0000; color: white; }
        .btn-trash { background: #ef4444; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; }
        .btn-hit-toggle { background: linear-gradient(45deg, var(--neon-gold), #ccac00); color: black; border: none; padding: 14px 20px; font-family: 'Impact', sans-serif; border-radius: 6px; cursor: pointer; }
        .btn-delete { background: linear-gradient(45deg, #22c55e, #15803d); color: white; border: none; padding: 14px 24px; font-family: 'Impact', sans-serif; border-radius: 6px; cursor: pointer; }
        .section-title { font-size: 22px; color: #ffffff; margin: 25px 0 15px 0; text-transform: uppercase; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0b12; z-index:9999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:#14141f; padding:40px; border-radius:12px; border:2px solid var(--neon-pink); text-align:center;">
            <h2 style="color:var(--neon-pink);">🔒 MONDO RECORDS SCHALTZENTRALE</h2>
            <input type="password" id="adminPassInput" placeholder="STUDIO PASSWORT"><br><br>
            <button class="btn-control" onclick="tryLogin()">PROCEED</button>
        </div>
    </div>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card">
                <div class="header-flex">
                    <h1>MONDO MANDO RECORDS LIVE-BOARD</h1>
                    <button class="btn-control" style="background:#ef4444;" onclick="resetQueue()">LISTE RESETTEN</button>
                </div>
                <div class="admin-time-box" style="flex-direction:column; gap:10px;">
                    <div>SHOW-ZEIT: <span id="admin-total-time" class="time-value">0 Min. 00 Sek.</span> | <span id="admin-form-status">🟢 LÄDT...</span></div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-control" onclick="setSystemStatus(true)">🟢 ONLINE</button>
                        <button class="btn-control" onclick="setSystemStatus(false)">🔴 OFFLINE</button>
                        <button id="btn-extension-toggle" class="btn-control" onclick="toggleExtension()">⏳ 30 MIN. VERLÄNGERUNG</button>
                        <button class="btn-control" style="background:var(--neon-gold); color:black;" onclick="toggleVoting()">🏆 LIVE-VOTING</button>
                    </div>
                </div>
                <div class="section-title">Offene Einsendungen 🔥</div>
                <div id="admin-active-list"></div>
            </div>
        </div>
    </div>
<script>
    let token = "";
    function tryLogin() {
        const pass = document.getElementById('adminPassInput').value;
        fetch('/api/admin/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password: pass }) })
        .then(res => { if (res.ok) { token = pass; document.getElementById('login-overlay').style.display = 'none'; loadAdminQueue(); } else alert("Falsches Passwort!"); });
    }

    async function loadAdminQueue() {
        if(!token) return;
        const res = await fetch('/api/queue'); const data = await res.json();
        const activeList = document.getElementById('admin-active-list');
        activeList.innerHTML = '';
        document.getElementById('admin-total-time').innerText = data.spentFormatted;
        
        data.queue.forEach((item, index) => {
            const stimmen = (data.votes && data.votes[index]) ? data.votes[index].length : 0;
            let iconHtml = item.platform === 'spotify' ? `<span class="link-icon icon-spotify">SPOTIFY</span>` : `<span class="link-icon icon-youtube">YOUTUBE</span>`;
            
            if(!item.isDone) {
                activeList.innerHTML += `
                    <div class="admin-item">
                        <div>
                            <h3>${item.artist} - ${item.title}</h3>
                            <p>Stimmen: ${stimmen} | Link: <a href="${item.songLink}" target="_blank">${iconHtml}</a></p>
                        </div>
                        <div class="actions-flex">
                            <button class="btn-hit-toggle" onclick="toggleHit(${index})">HIT ⭐</button>
                            <button class="btn-delete" onclick="toggleDone(${index})">✓</button>
                            <button class="btn-trash" onclick="trashSong(${index})">🗑️</button>
                        </div>
                    </div>`;
            }
        });
    }

    async function toggleExtension() { 
        const res = await fetch('/api/admin/toggle-extension', { method: 'POST', headers: {'Authorization': token} });
        const data = await res.json();
        alert(data.extensionActive ? "⏳ Verlängerung AN!" : "🚫 Verlängerung AUS!");
        loadAdminQueue();
    }
    async function setSystemStatus(status) { 
        await fetch('/api/admin/set-system-status', { method: 'POST', headers: {'Authorization': token, 'Content-Type': 'application/json'}, body: JSON.stringify({ online: status }) });
        alert(status ? "✅ System ONLINE" : "🔴 System OFFLINE");
        loadAdminQueue();
    }
    async function toggleHit(i) { await fetch(`/api/queue/${i}/hit`, { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function toggleDone(i) { await fetch(`/api/queue/${i}/done`, { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function trashSong(i) { if(confirm("Löschen?")) { await fetch(`/api/queue/${i}`, { method: 'DELETE', headers: {'Authorization': token} }); loadAdminQueue(); } }
    async function resetQueue() { if(confirm("Reset?")) { await fetch('/api/queue/reset', { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); } }
    async function toggleVoting() { await fetch('/api/admin/toggle-voting', { method: 'POST', headers: {'Authorization': token} }); alert("Voting-Status geändert!"); loadAdminQueue(); }
</script>
</body>
</html>

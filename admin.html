<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando - Admin Schaltzentrale</title>
    <style>
        :root { 
            --neon-pink: #ff007f; 
            --neon-cyan: #00f2fe; 
            --neon-gold: #ffd700; 
            --neon-purple: #9d4edd;
            --neon-orange: #ff6b35;
            --text-main: #ffffff; 
            --form-bg: rgba(19, 19, 26, 0.9); 
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 850px; }
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-pink); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); backdrop-filter: blur(5px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 20px;}
        h1 { margin: 0; font-size: 32px; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-pink); }
        .btn-reset { background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-family: sans-serif; font-weight: bold; cursor: pointer; transition: all 0.2; }
        .btn-reset:hover { background-color: #b91c1c; transform: scale(1.05); }
        
        .admin-time-box { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: rgba(5, 5, 7, 0.6); border: 1px dashed var(--neon-cyan); border-radius: 8px; font-family: sans-serif; font-size: 16px; font-weight: bold; }
        .time-value { color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0, 242, 254, 0.5); }
        .status-open { color: var(--neon-cyan); }
        .status-closed { color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }

        .admin-item { display: flex; flex-direction: column; gap: 15px; padding: 20px; background-color: rgba(5, 5, 7, 0.85); border: 2px solid #2a2a35; border-radius: 8px; margin-bottom: 15px; font-family: sans-serif; }
        @media(min-width: 768px) {
            .admin-item { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        .admin-item.is-active-first { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .admin-item.is-hit { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .admin-item.is-done-admin { border-color: #22c55e; opacity: 0.4; box-shadow: none; }

        .song-details h3 { margin: 0 0 5px 0; font-size: 20px; color: #fff; }
        .song-details p { margin: 0; color: #8e8e9f; font-size: 14px; }
        
        /* Badges für die Live-Anzeige der Urteile */
        .status-badge { display: inline-block; font-family: 'Impact', sans-serif; font-size: 12px; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; margin-right: 6px; margin-bottom: 5px; }
        .badge-playlist { background-color: var(--neon-gold); color: #000; box-shadow: 0 0 8px var(--neon-gold); }
        .badge-potenzial { background-color: var(--neon-cyan); color: #000; box-shadow: 0 0 8px var(--neon-cyan); }
        .badge-edit { background-color: var(--neon-orange); color: #fff; box-shadow: 0 0 8px var(--neon-orange); }
        .badge-taste { background-color: #4b5563; color: #fff; }

        .actions-flex { display: flex; flex-wrap: wrap; gap: 8px; }
        
        /* Basis Button-Style */
        .btn-action { padding: 10px 14px; font-size: 14px; font-family: 'Impact', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 6px; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-block; text-align: center; color: black; }
        .btn-action:hover { filter: brightness(1.2); transform: scale(1.03); }

        .btn-listen { background: linear-gradient(45deg, var(--neon-cyan), #008fa3); }
        
        /* Die neuen Feedback-Buttons */
        .btn-playlist { background: linear-gradient(45deg, var(--neon-gold), #ccac00); }
        .btn-potenzial { background: linear-gradient(45deg, #a2d2ff, #48cae4); }
        .btn-edit { background: linear-gradient(45deg, var(--neon-orange), #d94e14); color: white; }
        .btn-taste { background: linear-gradient(45deg, #9f9f9f, #5a5a5a); color: white; }
        
        .btn-delete { background: linear-gradient(45deg, #22c55e, #15803d); color: white; padding: 10px 18px; }
        .btn-undo { background: #374151; color: #d1d5db; padding: 10px 16px; }
        .btn-undo:hover { background: #4b5563; }

        .section-title { font-size: 22px; letter-spacing: 1px; color: #ffffff; margin: 25px 0 15px 0; text-transform: uppercase; border-bottom: 2px dashed #3a3a45; padding-bottom: 5px; }
        .no-songs { text-align: center; font-family: sans-serif; color: #8e8e9f; padding: 20px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card">
                <div class="header-flex">
                    <h1>MONDO MANDO LIVE-BOARD</h1>
                    <button class="btn-reset" onclick="resetQueue()">LISTE RESETTEN</button>
                </div>

                <div class="admin-time-box">
                    <div>SHOW-ZEIT BELEGT (+2M FEEDBACK): <span id="admin-total-time" class="time-value">0 Min. 00 Sek.</span></div>
                    <div id="admin-form-status" class="status-open">🟢 FORMULAR GEÖFFNET</div>
                </div>

                <div class="section-title" style="color: var(--neon-cyan);">Offene Einsendungen 🔥</div>
                <div id="admin-active-list"></div>

                <div class="section-title" style="color: #22c55e;">Bereits bewertet (Historie) ✓</div>
                <div id="admin-done-list"></div>
            </div>
        </div>
    </div>
<script>
    async function loadAdminQueue() {
        try {
            const res = await fetch('/api/queue'); const data = await res.json();
            const queue = data.queue || [];
            
            const activeList = document.getElementById('admin-active-list');
            const doneList = document.getElementById('admin-done-list');
            
            document.getElementById('admin-total-time').innerText = data.spentFormatted;
            const statusText = document.getElementById('admin-form-status');
            if (data.submissionsOpen) {
                statusText.innerText = "🟢 FORMULAR GEÖFFNET";
                statusText.className = "status-open";
            } else {
                statusText.innerText = "🔴 LIMIT ERREICHT (GESPERRT)";
                statusText.className = "status-closed";
            }
            
            const activeSongs = queue.filter(item => !item.isDone);
            
            activeList.innerHTML = '';
            doneList.innerHTML = '';
            
            if(activeSongs.length === 0) { activeList.innerHTML = '<div class="no-songs">Keine offenen Songs in der Warteliste.</div>'; }
            if(queue.length - activeSongs.length === 0) { doneList.innerHTML = '<div class="no-songs">Noch keine Songs bewertet.</div>'; }

            queue.forEach((item, index) => {
                const min = Math.floor(item.duration / 60); const sec = item.duration % 60;
                const safeLink = item.songLink ? item.songLink : '#';
                const listenButtonStyle = item.songLink ? '' : 'style="opacity: 0.3; pointer-events: none;"';

                // Dynamische Badges je nach vergebenem Status generieren
                let judgmentBadges = '';
                if (item.isHit) judgmentBadges += '<span class="status-badge badge-playlist">🔥 PLAYLIST-HIT</span>';
                if (item.status === 'potenzial') judgmentBadges += '<span class="status-badge badge-potenzial">🎶 HIT-POTENZIAL</span>';
                if (item.status === 'edit') judgmentBadges += '<span class="status-badge badge-edit">✍🏼 ÜBERARBEITEN</span>';
                if (item.status === 'taste') judgmentBadges += '<span class="status-badge badge-taste">🙈 KEIN GESCHMACK</span>';

                if(!item.isDone) {
                    let activeIndex = activeSongs.indexOf(item);
                    let titlePrefix = activeIndex === 0 ? '<span style="color:var(--neon-cyan); font-weight:bold;">[DRAN] </span>' : '';
                    
                    let itemStyleClass = item.isHit ? 'is-hit' : '';
                    if (activeIndex === 0 && !item.isHit) { itemStyleClass = 'is-active-first'; }

                    const totalSongTime = `${min + 2}:${sec < 10 ? '0' : ''}${sec} Min.`;

                    activeList.innerHTML += `
                        <div class="admin-item ${itemStyleClass}">
                            <div class="song-details">
                                <div>${judgmentBadges}</div>
                                <h3>${titlePrefix}${item.artist} - ${item.title}</h3>
                                <p>Genre: ${item.genre} | Sendezeit inkl. Feedback: ⏱️ ${totalSongTime}</p>
                            </div>
                            <div class="actions-flex">
                                <a href="${safeLink}" target="_blank" class="btn-action btn-listen" ${listenButtonStyle}>ANHÖREN 🎧</a>
                                <button class="btn-action btn-playlist" onclick="updateStatus(${index}, 'hit')">HIT 🔥</button>
                                <button class="btn-action btn-potenzial" onclick="updateStatus(${index}, 'potenzial')">POTENZIAL 🎶</button>
                                <button class="btn-action btn-edit" onclick="updateStatus(${index}, 'edit')">REWRITE ✍🏼</button>
                                <button class="btn-action btn-taste" onclick="updateStatus(${index}, 'taste')">GESCHMACK 🙈</button>
                                <button class="btn-action btn-delete" onclick="toggleDone(${index})">ERLEDIGT ✓</button>
                            </div>
                        </div>`;
                } else {
                    let donePrefix = item.isHit ? '<span style="color:var(--neon-gold); font-weight:bold;">[⭐ HIT] </span>' : '';
                    doneList.innerHTML += `
                        <div class="admin-item is-done-admin">
                            <div class="song-details">
                                <div>${judgmentBadges}</div>
                                <h3>${donePrefix}${item.artist} - ${item.title}</h3>
                                <p>Genre: ${item.genre}</p>
                            </div>
                            <div class="actions-flex">
                                <button class="btn-action btn-undo" onclick="toggleDone(${index})">↩ ZURÜCK</button>
                            </div>
                        </div>`;
                }
            });
        } catch(e) { console.log(e); }
    }

    // Übergibt den spezifischen Status per POST an deine Server-API
    async function updateStatus(index, statusType) { 
        if (statusType === 'hit') {
            await fetch(`/api/queue/${index}/hit`, { method: 'POST' });
        } else {
            await fetch(`/api/queue/${index}/status`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: statusType }) 
            });
        }
        loadAdminQueue(); 
    }
    
    async function toggleDone(index) { await fetch(`/api/queue/${index}/done`, { method: 'POST' }); loadAdminQueue(); }
    
    async function resetQueue() {
        if(confirm("Möchtest du wirklich ALLE Songs (auch die Historie) löschen?")) {
            await fetch('/api/queue/reset', { method: 'POST' }); loadAdminQueue();
        }
    }
    
    loadAdminQueue(); setInterval(loadAdminQueue, 4000);
</script>
</body>
</html>

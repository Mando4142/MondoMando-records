<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mondo Mando Studio - Chef Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b12; color: #fff; padding: 30px; }
        h1 { color: #00ffcc; }
        .admin-box { background: #14141f; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #232335; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #232335; }
        th { background: #1e1e2e; color: #aaa; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: #fff; margin-right: 5px; }
        .btn-hit { background: #ffaa00; }
        .btn-done { background: #00ffcc; color: #000; }
        .btn-reset { background: #ff3366; padding: 10px 20px; font-size: 14px; }
        tr.is-done { opacity: 0.3; text-decoration: line-through; }
        tr.is-hit { background: rgba(255, 170, 0, 0.05); }
    </style>
</head>
<body>

    <h1>👑 MONDO MANDO STUDIO – ADMIN PANEL</h1>

    <div class="admin-box" style="border-color: #7f4ed2;">
        <h3 style="margin: 0 0 5px 0; font-size: 16px; color: #aaa;">Stream-Zeit-Manager (Max 90 Min)</h3>
        <p style="margin: 5px 0; font-size: 20px; font-weight: bold;">
            Aktuell verplante Sendezeit: <span id="admin-total-time" style="color: #00ffcc;">0 Min.</span>
        </p>
        <p id="admin-form-status" style="margin: 5px 0; font-weight: bold; color: #00ffcc;">🟢 Formular geöffnet</p>
    </div>

    <div class="admin-box">
        <button class="btn btn-reset" onclick="resetQueue()">🧹 Warteliste komplett zurücksetzen</button>
    </div>

    <h2>📋 Song-Eingänge</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Künstler</th>
                <th>Titel</th>
                <th>Genre</th>
                <th>Dauer (+2m Feedback)</th>
                <th>Link</th>
                <th>Aktionen</th>
            </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
    </table>

    <script>
        function loadAdminQueue() {
            fetch('/api/queue')
                .then(res => res.json())
                .then(data => {
                    // 1. Statistiken updaten
                    document.getElementById('admin-total-time').innerText = data.totalTimeFormatted;
                    
                    const statusText = document.getElementById('admin-form-status');
                    if (data.submissionsOpen) {
                        statusText.innerText = "🟢 Formular geöffnet (Zuschauer können senden)";
                        statusText.style.color = "#00ffcc";
                    } else {
                        statusText.innerText = "🔴 LIMIT ERREICHT: Formular wurde automatisch gesperrt!";
                        statusText.style.color = "#ff3366";
                    }

                    // 2. Tabelle aufbauen
                    const tbody = document.getElementById('adminTableBody');
                    tbody.innerHTML = '';

                    data.queue.forEach((song, index) => {
                        const min = Math.floor(song.duration / 60);
                        const sec = song.duration % 60;
                        // Zeigt echte Dauer + 2 Min im Admin-Panel an
                        const totalSongTime = `${min + 2}:${sec < 10 ? '0' : ''}${sec}`;

                        let trClass = "";
                        if(song.isHit) trClass = "is-hit";
                        if(song.isDone) trClass = "is-done";

                        tbody.innerHTML += `
                            <tr class="${trClass}">
                               <td>${index + 1}</td>
                               <td><strong>${song.artist}</strong></td>
                               <td>${song.title}</td>
                               <td>${song.genre}</td>
                               <td>⏱️ ${totalSongTime}</td>
                               <td><a href="${song.songLink}" target="_blank" style="color: #00ffcc;">Link ↗</a></td>
                               <td>
                                   <button class="btn btn-hit" onclick="toggleHit(${index})">🔥 Hit</button>
                                   <button class="btn btn-done" onclick="toggleDone(${index})">✅ Erledigt</button>
                               </td>
                            </tr>
                        `;
                    });
                });
        }

        function toggleHit(index) {
            fetch(`/api/queue/${index}/hit`, { method: 'POST' })
                .then(() => loadAdminQueue());
        }

        function toggleDone(index) {
            fetch(`/api/queue/${index}/done`, { method: 'POST' })
                .then(() => loadAdminQueue());
        }

        function resetQueue() {
            if(confirm("Möchtest du die Warteliste wirklich komplett leeren?")) {
                fetch('/api/queue/reset', { method: 'POST' })
                    .then(() => loadAdminQueue());
            }
        }

        setInterval(loadAdminQueue, 5000);
        loadAdminQueue();
    </script>
</body>
</html>

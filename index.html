<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Records - Dashboard</title>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-green: #22c55e;
            --neon-orange: #ff5500; --text-main: #ffffff; --text-muted: #8e8e9f; --form-bg: rgba(19, 19, 26, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.8); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 650px; pointer-events: auto; }
        
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1); backdrop-filter: blur(5px); }
        .card.pink-glow { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2), inset 0 0 15px rgba(255, 0, 127, 0.1); }
        .card.gold-glow { border-color: var(--neon-gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 215, 0, 0.1); }

        .btn-rules-small { position: absolute; top: 15px; right: 20px; background: rgba(255, 0, 127, 0.2); border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; text-transform: uppercase; animation: pulse-pink 2s infinite; font-family: sans-serif; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 5px var(--neon-pink); } 50% { box-shadow: 0 0 15px var(--neon-pink); } 100% { box-shadow: 0 0 5px var(--neon-pink); } }
        
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .popup-content { background: var(--form-bg); border: 3px solid var(--neon-cyan); padding: 40px; border-radius: 20px; max-width: 550px; width: 90%; color: white; text-align: center; }
        .neon-link { display: block; padding: 15px; text-decoration: none; font-family: 'Impact'; font-size: 18px; border-radius: 8px; color: black; margin-bottom: 10px; border: 2px solid #fff; }

        .status-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; text-transform: uppercase; }
        .status-stats { display: flex; justify-content: space-between; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .badge-live { background-color: var(--neon-pink); color: white; padding: 4px 10px; border-radius: 4px; font-size: 14px; margin-right: 10px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .cal-day { padding: 10px 5px; background: rgba(5,5,7,0.8); border: 1px solid #2a2a35; border-radius: 6px; cursor: pointer; }
        .cal-day.is-selected { background: var(--neon-gold); color: black; }
        
        .form-group { margin-bottom: 22px; }
        input, select { width: 100%; padding: 14px; background: rgba(5, 5, 7, 0.8); border: 2px solid #2a2a35; border-radius: 8px; color: white; font-size: 16px; }
        .btn-submit { width: 100%; padding: 20px; font-size: 24px; text-transform: uppercase; color: #ffffff; border: none; border-radius: 8px; cursor: pointer; background: var(--neon-pink); }
        .queue-item { display: flex; justify-content: space-between; padding: 15px; background: rgba(5, 5, 7, 0.8); border-left: 5px solid var(--neon-cyan); margin-bottom: 10px; }
        .hof-card { border: 2px solid var(--neon-gold); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card" style="padding: 25px;">
                <div class="status-header">
                    <span><span id="live-badge" class="badge-live" style="display:none;">LIVE</span>STREAM</span>
                    <span id="countdown" style="color:var(--neon-cyan)">...</span>
                </div>
                <hr>
                <div class="status-stats">
                    <div>FREI: <span id="time-left-pot" style="color:var(--neon-cyan)">90 Min.</span></div>
                    <div>BELEGT: <span id="estimated-wait" style="color:var(--neon-cyan)">0 Min.</span></div>
                </div>
                <div id="calendar-grid-content" class="calendar-grid"></div>
            </div>

            <div id="dynamic-main-card" class="card pink-glow" style="position: relative;">
                <button class="btn-rules-small" onclick="document.getElementById('rulesPopup').style.display='flex'">Regeln lesen</button>
                <h2>SONG EINREICHEN</h2>
                <form id="songForm" onsubmit="addSongToServer(event)">
                    <div class="form-group"><label>Künstlername</label><input type="text" id="artistName" required></div>
                    <div class="form-group"><label>Song Titel</label><input type="text" id="songTitle" required></div>
                    <div class="form-group"><label>Song Link</label><input type="url" id="songLink" required></div>
                    <div class="form-group"><label>Dauer (Min/Sek)</label><div style="display:flex; gap:10px;"><input type="number" id="durationMin" required><input type="number" id="durationSec" required></div></div>
                    <div class="form-group"><label>Genre</label><select id="genre" required><option>Pop</option><option>Hip Hop</option><option>Schlager (Gesperrt)</option></select></div>
                    <div class="form-group" style="border:1px dashed var(--neon-pink); padding:10px; border-radius:8px;">
                        <label><input type="checkbox" required> Ich besitze alle Rechte.</label>
                        <label style="color:#ffcccc"><input type="checkbox" required> <strong>FAIR PLAY:</strong> Keine Fake-Namen! <strong>Permabann!</strong></label>
                    </div>
                    <button type="submit" class="btn-submit">SONG EINSENDEN</button>
                </form>
            </div>

            <div id="rulesPopup" class="popup-overlay">
                <div class="popup-content">
                    <span class="popup-close" onclick="document.getElementById('rulesPopup').style.display='none'" style="cursor:pointer; font-size:30px; float:right;">&times;</span>
                    <h2>STREAM-REGELN</h2>
                    <div style="font-size:20px; line-height:2; color:#ccc;">
                        <p>1. Zeitlimit: 90 Min.</p>
                        <p>2. Genres: Schlager, Hardstyle, Hardcore & Metal verboten.</p>
                        <p>3. Fair Play: Keine Fake-Namen! Verstöße = <strong>Permabann!</strong></p>
                    </div>
                </div>
            </div>

            <div class="card pink-glow"><h2>WARTELISTE</h2><div id="queue-list"></div></div>
            <div class="card gold-glow"><h2>⭐ HIT PLAYLIST ⭐</h2><div id="hit-bestenliste"></div></div>
            <div class="card" style="border-color:#22c55e"><h2>BEREITS BEWERTET 🔥</h2><div id="done-list"></div></div>
            <div class="card gold-glow"><h2>👑 HALL OF FAME 👑</h2><div id="hof-list"></div></div>
        </div>
    </div>

    <script>
        let calDate = new Date();
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid-content');
            grid.innerHTML = '';
            for(let i=1; i<=7; i++) {
                const day = document.createElement('div');
                day.className = 'cal-day'; day.innerText = i;
                grid.appendChild(day);
            }
            document.getElementById('cal-month-year').innerText = calDate.toLocaleString('de-CH', { month: 'long', year: 'numeric' }).toUpperCase();
        }

        async function loadQueue() {
            try {
                const res = await fetch('/api/queue'); const data = await res.json();
                document.getElementById('queue-count').innerText = data.queue.filter(i=>!i.isDone).length;
                const list = document.getElementById('queue-list'); list.innerHTML = '';
                data.queue.filter(i=>!i.isDone).forEach(item => list.innerHTML += `<div class="queue-item"><h4>${item.artist} - ${item.title}</h4></div>`);
            } catch(e) {}
        }

        async function addSongToServer(e) {
            e.preventDefault();
            const res = await fetch('/api/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
                artist: document.getElementById('artistName').value,
                title: document.getElementById('songTitle').value,
                duration: (parseInt(document.getElementById('durationMin').value)*60) + parseInt(document.getElementById('durationSec').value),
                genre: document.getElementById('genre').value,
                songLink: document.getElementById('songLink').value
            })});
            const resData = await res.json();
            if(resData.voteCode) {
                const overlay = document.createElement('div');
                overlay.className = "popup-overlay"; overlay.style.display = "flex";
                overlay.innerHTML = `<div class="popup-content">
                    <h1>TRACK EINGEREICHT!</h1>
                    <div style="background:#000; padding:20px; font-size:40px; color:var(--neon-cyan); border:1px dashed var(--neon-cyan); margin:20px 0;">${resData.voteCode}</div>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/4fc302b9-f53e-4994-8612-11fd40e6c5d3?checkout[custom][voteCode]=${resData.voteCode}" class="neon-link" style="background:var(--neon-cyan)">🚀 PLATZ 1 BOOST</a>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/434396c0-e721-45e1-8751-f5d39d3a4632?checkout[custom][voteCode]=${resData.voteCode}" class="neon-link" style="background:#7000ff; color:white">🌙 AFTER HOURS PASS</a>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/65229fc8-af91-4ef7-a20c-738d5933a25a?checkout[custom][voteCode]=${resData.voteCode}" class="neon-link" style="background:var(--neon-pink); color:white">🎲 SONGWÜRFEL</a>
                    <button onclick="this.parentElement.parentElement.remove()" style="width:100%; padding:20px; background:#374151; color:white; border:none; border-radius:10px; margin-top:20px; font-size:20px;">SCHLIESSEN</button>
                </div>`;
                document.body.appendChild(overlay);
                document.getElementById('songForm').reset();
                loadQueue();
            }
        }
        setInterval(loadQueue, 5000);
        loadQueue();
        renderCalendar();
    </script>
</body>
</html>
